<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5; index.html">
    <title>Payment Success - ATW Travels</title>
    <link rel='stylesheet' id='bootstrap-css-css'
        href='wp-content/themes/traveler/v2/css/bootstrap.minaec2.css?ver=6.4.1' type='text/css' media='all' />
    <link rel="stylesheet" href="style.css">
    <style>
        .payment-details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #28a745;
        }
        .payment-details h4 {
            color: #28a745;
            margin-bottom: 15px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 5px 0;
            border-bottom: 1px solid #e9ecef;
        }
        .detail-label {
            font-weight: bold;
            color: #495057;
        }
        .detail-value {
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12 p-5">
                <div class="modal-overlay" id="successModal">
                    <div class="modal-container">
                        <div class="success-icon">&#10004;</div>
                        <h3>Payment Successful!</h3>
                        <p>Your payment was processed successfully.</p>
                        
                        <!-- Payment Details -->
                        <div class="payment-details" id="paymentDetails" style="display: none;">
                            <h4>Payment Details</h4>
                            <div class="detail-row">
                                <span class="detail-label">Transaction ID:</span>
                                <span class="detail-value" id="txnid">-</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Amount:</span>
                                <span class="detail-value" id="amount">-</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Payment Mode:</span>
                                <span class="detail-value" id="mode">-</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Status:</span>
                                <span class="detail-value" id="status">-</span>
                            </div>
                        </div>
                        
                        <a href="/">OK</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script type="text/javascript" src="wp-content/themes/traveler/v2/js/bootstrap.min.js"
        id="bootstrap-js-js"></script>
    
    <script>
        // Parse URL parameters for PayU callback
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        // Display payment details if available
        document.addEventListener('DOMContentLoaded', function() {
            const txnid = getUrlParameter('txnid');
            const amount = getUrlParameter('amount');
            const mode = getUrlParameter('mode');
            const status = getUrlParameter('status');
            
            if (txnid) {
                document.getElementById('paymentDetails').style.display = 'block';
                document.getElementById('txnid').textContent = txnid;
                document.getElementById('amount').textContent = '₹' + amount;
                document.getElementById('mode').textContent = mode || 'Online';
                document.getElementById('status').textContent = status || 'Success';
            }
        });
    </script>
</body>
</html>
