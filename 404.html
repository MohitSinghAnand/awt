<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(120deg, #74ebd5 0%, #9face6 100%);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
    max-width: 900px;
    background-color: rgba(255, 255, 255, 0.8);
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
}

.error-content {
    max-width: 400px;
    margin: 0 auto;
}

h1 {
    font-size: 80px;
    font-weight: 600;
    color: #ff6f61;
}

.subheading {
    font-size: 24px;
    font-weight: 500;
    color: #333;
    margin-bottom: 15px;
}

p {
    color: #555;
    font-size: 18px;
    line-height: 1.5;
}

.back-button {
    margin-top: 20px;
    display: inline-block;
    padding: 12px 30px;
    background-color: #ff6f61;
    color: white;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 5px;
    transition: background 0.3s ease;
}

.back-button:hover {
    background-color: #e6554f;
}

.image img {
    max-width: 400px;
    width: 100%;
}

@media (max-width: 768px) {
    .container {
        flex-direction: column;
        padding: 20px;
    }

    .image {
        margin-top: 20px;
    }
}

    </style>
</head>
<body>
    <div class="container">
        <div class="error-content">
            <h1>404</h1>
            <p class="subheading">Oops! You seem to be lost.</p>
            <p>It looks like the page you're looking for doesn't exist. Let's get you back on track to plan your dream journey!</p>
            <a href="/" class="back-button">Go Home</a>
        </div>
        <div class="image">
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/travel-influencer-going-on-vacation-error-404-illustration-download-in-svg-png-gif-file-formats--blogger-woman-asian-traveling-smartphone-travelling-alone-pack-design-development-illustrations-8484960.png" alt="Travel Image">
        </div>
    </div>
</body>
</html>
